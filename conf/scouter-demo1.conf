# ============================================================
# Scouter Agent Configuration - Instance 1 (perf-demo-1)
# Port: 18081
# ============================================================

obj_name=perf-demo-1

# Scouter Server 연결
net_collector_ip=127.0.0.1
net_collector_udp_port=6100
net_collector_tcp_port=6100

# Method Profiling - 전체 패키지 메서드 추적
hook_method_patterns=com.example.perfdemo.*.*
hook_method_exclude_patterns=*$*Builder*
hook_method_ignore_prefixes=
hook_method_access_private_enabled=true
hook_method_access_protected_enabled=true
profile_method_enabled=true
profile_spring_controller_method_parameter_enabled=true
hook_spring_rest_enabled=true

# SQL Profiling - 바인드 파라미터 표시
profile_sql_param_enabled=true
#hook_jdbc_pstmt_classes=com.zaxxer.hikari.pool.HikariProxyPreparedStatement
#oracle.jdbc.driver.OraclePreparedStatementWrapper
#공식문서나 이런 곳은 없지만 기본적인 oracle, h2 같은 jdbc 는 스카우터가 알아서 후킹한다.
#hook_jdbc_pstmt_classes hooking은 개별적으로 만든 jdbc wrapper나 유명하지않은 
#DB 드라이버를 스카우터가 자동으로 못 잡을 때 수동 지정하는 옵션이다.                  
#HikariCP 같은 커넥션 풀 프록시 클래스를 여기에 넣으면, 프록시 레벨 + 드라이버 레벨에서 이중 후킹되어
#sqlCount/sqlTime이 정확히 2배로 기록된다. 프로파일에서 "unknown" SQL3 step이 부모로 생기는 것이 그 증거.
#2026-03-12 부하테스트로 확인: demo1(주석처리) sqlCount=1, demo2/3(hikari hook) sqlCount=2, overcounting 19%

# XLog 샘플링 (전수 수집)
xlog_sampling_enabled=false

# HTTP 파라미터 수집
profile_http_parameter_enabled=true
profile_http_header_enabled=true
