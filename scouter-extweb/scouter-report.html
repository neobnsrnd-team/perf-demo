        // txid 하이퍼링크
        if (txidRowMap) {
            for (let r = 0; r < intRows.length; r++) {
                const txidCell = intRows[r][7];
                if (!txidCell) continue;
                const cellRef = XLSX.utils.encode_cell({ r: r + 1, c: 7 });
                const txids = txidCell.split(', ').filter(Boolean);
                let targetRow = null;
                for (const txid of txids) {
                    if (txidRowMap[txid] && txidRowMap[txid].length > 0) {
                        targetRow = txidRowMap[txid][0];
                        break;
                    }
                }
                if (targetRow && wsInt[cellRef]) {
                    wsInt[cellRef].l = { Target: '#XLog!A' + targetRow, Tooltip: 'XLog 시트로 이동' };
                }
            }
        }

        XLSX.utils.book_append_sheet(wb, wsInt, '통합');
    }

    function buildIntegrationSheetByInstance(wb, xlogPoints, counterResults, counters, txidRowMap) {
        const cpuIdx = counters.findIndex(c => c.key === 'ProcCpu');
        const heapIdx = counters.findIndex(c => c.key === 'HeapUsed');
        if (cpuIdx < 0 && heapIdx < 0) return;

        // 인스턴스 목록 수집
        const instanceNames = new Set();
        counterResults.forEach(cr => {
            if (cr.byObj) Object.keys(cr.byObj).forEach(n => instanceNames.add(n));
        });
        if (instanceNames.size <= 1) return;

        const TIME_TOLERANCE = 10000;
        const MATCH_WINDOW = 10000;

        function findNearest(map, targetTime, tolerance) {
            if (map[targetTime] != null) return map[targetTime];
            let nearest = null, minDiff = tolerance + 1;
            for (const k in map) {
                const diff = Math.abs(Number(k) - targetTime);
                if (diff <= tolerance && diff < minDiff) {
                    minDiff = diff;
                    nearest = map[k];
                }
            }
            return nearest;
        }

        [...instanceNames].sort().forEach(instName => {
            const procCpuData = (cpuIdx >= 0 && counterResults[cpuIdx].byObj && counterResults[cpuIdx].byObj[instName])
                ? counterResults[cpuIdx].byObj[instName] : { times: [], values: [] };
            const heapData = (heapIdx >= 0 && counterResults[heapIdx].byObj && counterResults[heapIdx].byObj[instName])
                ? counterResults[heapIdx].byObj[instName] : { times: [], values: [] };

            const timePoints = procCpuData.times.length > 0 ? procCpuData.times
                : (heapData.times.length > 0 ? heapData.times : []);
            if (timePoints.length === 0) return;

            const cpuMap = {};
            procCpuData.times.forEach((t, i) => { cpuMap[t] = procCpuData.values[i]; });
            const heapMap = {};
            heapData.times.forEach((t, i) => { heapMap[t] = heapData.values[i]; });

            // 해당 인스턴스의 XLog만 필터
            const instXlog = [...xlogPoints].filter(p => {
                const pName = (p.objName || '').split('/').pop();
                return pName === instName;
            }).sort((a, b) => a.x - b.x);

            const intHeader = ['시간', 'ProcCpu(%)', 'HeapUsed(MB)', '트랜잭션수', '평균응답(ms)', '최대응답(ms)', '에러수', 'txid (±10초 이내)'];
            const intRows = [];

            for (let i = 0; i < timePoints.length; i++) {
                const t = timePoints[i];
                const cpuRaw = findNearest(cpuMap, t, TIME_TOLERANCE);
                const heapRaw = findNearest(heapMap, t, TIME_TOLERANCE);
                const cpuVal = cpuRaw != null ? Number(cpuRaw).toFixed(1) : '';
                const heapVal = heapRaw != null ? Number(heapRaw).toFixed(1) : '';

                const matched = instXlog.filter(p => Math.abs(p.x - t) <= MATCH_WINDOW);
                const txCount = matched.length;
                const avgResp = txCount > 0 ? Math.round(matched.reduce((s, p) => s + p.y, 0) / txCount) : '';
                const maxResp = txCount > 0 ? max(matched.map(p => p.y)) : '';
                const errCount = matched.filter(p => p.color === 'rgba(0,0,0,0.7)').length;
                const uniqueTxids = [...new Set(matched.map(p => p.txid).filter(Boolean))];
                const MAX_TXIDS = 20;
                const txidStr = uniqueTxids.length > MAX_TXIDS
                    ? uniqueTxids.slice(0, MAX_TXIDS).join(', ') + ' ... (+' + (uniqueTxids.length - MAX_TXIDS) + '건)'
                    : uniqueTxids.join(', ');

                intRows.push([
                    formatTimeMs(t), cpuVal, heapVal,
                    txCount || '', avgResp, maxResp, errCount || '',
                    txidStr
                ]);
            }

            const wsInt = XLSX.utils.aoa_to_sheet([intHeader, ...intRows]);
            wsInt['!cols'] = [
                { wch: 14 }, { wch: 12 }, { wch: 14 }, { wch: 10 },
                { wch: 12 }, { wch: 12 }, { wch: 8 }, { wch: 60 }
            ];

            // txid 하이퍼링크
            if (txidRowMap) {
                for (let r = 0; r < intRows.length; r++) {
                    const txidCell = intRows[r][7];
                    if (!txidCell) continue;
                    const cellRef = XLSX.utils.encode_cell({ r: r + 1, c: 7 });
                    const txids = txidCell.split(', ').filter(Boolean);
                    let targetRow = null;
                    for (const txid of txids) {
                        if (txidRowMap[txid] && txidRowMap[txid].length > 0) {
                            targetRow = txidRowMap[txid][0];
                            break;
                        }
                    }
                    if (targetRow && wsInt[cellRef]) {
                        wsInt[cellRef].l = { Target: '#XLog!A' + targetRow, Tooltip: 'XLog 시트로 이동' };
                    }
                }
            }

            const safeSheetName = ('통합_' + instName).substring(0, 31);
            XLSX.utils.book_append_sheet(wb, wsInt, safeSheetName);
        });
    }

    // ==================== 유틸리티: 백분위수 / TPS 계산 ====================
    function percentile(sortedArr, p) {
        if (sortedArr.length === 0) return 0;
        const idx = (p / 100) * (sortedArr.length - 1);
        const lo = Math.floor(idx), hi = Math.ceil(idx);
        if (lo === hi) return sortedArr[lo];
        return sortedArr[lo] + (sortedArr[hi] - sortedArr[lo]) * (idx - lo);
    }

    function calcTPS(count, startMs, endMs) {
        const sec = (endMs - startMs) / 1000;
        return sec > 0 ? (count / sec) : 0;
    }

    // ==================== Scouter 요약 시트 ====================
    function buildScouterSummarySheet(wb, xlogPoints, javaCounterResults, javaCounters) {
        if (!xlogPoints || xlogPoints.length === 0) return;
        const n1Threshold = getN1Threshold();
        const rows = [];

        const allElapsed = xlogPoints.map(p => p.y).sort((a, b) => a - b);
        const totalCount = xlogPoints.length;
        const minTime = min(xlogPoints.map(p => p.x));
        const maxTime = max(xlogPoints.map(p => p.x));
        const errorCount = xlogPoints.filter(p => p.error || p.color === 'rgba(0,0,0,0.7)').length;
        const n1Count = xlogPoints.filter(p => (p.sqlCount || 0) >= n1Threshold).length;
        const sqlBottleneckCount = xlogPoints.filter(p => p.y >= 3000 && (p.sqlTime || 0) > 0 && ((p.sqlTime || 0) / p.y) >= 0.98).length;

        // 카운터 인덱스 조회
        const cpuIdx = javaCounters ? javaCounters.findIndex(c => c.key === 'ProcCpu') : -1;
        const heapIdx = javaCounters ? javaCounters.findIndex(c => c.key === 'HeapUsed') : -1;
        const gcCountIdx = javaCounters ? javaCounters.findIndex(c => c.key === 'GcCount') : -1;
        const gcTimeIdx = javaCounters ? javaCounters.findIndex(c => c.key === 'GcTime') : -1;

        // 인스턴스별 카운터 통계 헬퍼
        function getInstanceCounterStats(instName) {
            const stats = { avgCpu: '', maxCpu: '', avgHeap: '', maxHeap: '', gcTotalCount: '', gcTotalTime: '' };
            if (!javaCounterResults || !javaCounters) return stats;

            // 인스턴스명 매칭: objName은 XLog에서는 원래 형태, byObj에서는 split('/').pop() 결과
            const shortName = instName.split('/').pop();

            if (cpuIdx >= 0 && javaCounterResults[cpuIdx] && javaCounterResults[cpuIdx].byObj) {
                const d = javaCounterResults[cpuIdx].byObj[shortName];
                if (d && d.values.length > 0) {
                    stats.avgCpu = Number((d.values.reduce((s, v) => s + v, 0) / d.values.length).toFixed(1));
                    stats.maxCpu = Number(max(d.values).toFixed(1));
                }
            }
            if (heapIdx >= 0 && javaCounterResults[heapIdx] && javaCounterResults[heapIdx].byObj) {
                const d = javaCounterResults[heapIdx].byObj[shortName];
                if (d && d.values.length > 0) {
                    stats.avgHeap = Number((d.values.reduce((s, v) => s + v, 0) / d.values.length).toFixed(1));
                    stats.maxHeap = Number(max(d.values).toFixed(1));
                }
            }
            if (gcCountIdx >= 0 && javaCounterResults[gcCountIdx] && javaCounterResults[gcCountIdx].byObj) {
                const d = javaCounterResults[gcCountIdx].byObj[shortName];
                if (d && d.values.length > 0) {
                    stats.gcTotalCount = Math.round(d.values.reduce((s, v) => s + v, 0));
                }
            }
            if (gcTimeIdx >= 0 && javaCounterResults[gcTimeIdx] && javaCounterResults[gcTimeIdx].byObj) {
                const d = javaCounterResults[gcTimeIdx].byObj[shortName];
                if (d && d.values.length > 0) {
                    stats.gcTotalTime = Math.round(d.values.reduce((s, v) => s + v, 0));
                }
            }
            return stats;
        }

        // ── 영역 1: 전체 총괄 ──
        rows.push(['[ 전체 총괄 ]']);
        rows.push(['항목', '값']);
        rows.push(['측정 기간', formatTimeMs(minTime) + ' ~ ' + formatTimeMs(maxTime)]);
        rows.push(['총 트랜잭션', totalCount]);
        rows.push(['평균 TPS', Number(calcTPS(totalCount, minTime, maxTime).toFixed(1))]);
        rows.push(['평균응답(ms)', Math.round(allElapsed.reduce((s, v) => s + v, 0) / totalCount)]);
        rows.push(['P50(ms)', Math.round(percentile(allElapsed, 50))]);
        rows.push(['P90(ms)', Math.round(percentile(allElapsed, 90))]);
        rows.push(['P95(ms)', Math.round(percentile(allElapsed, 95))]);
        rows.push(['P99(ms)', Math.round(percentile(allElapsed, 99))]);
        rows.push(['최대응답(ms)', allElapsed[allElapsed.length - 1]]);
        rows.push(['에러건수', errorCount]);
        rows.push(['에러율(%)', Number((errorCount / totalCount * 100).toFixed(2))]);
        rows.push(['N+1 의심', n1Count]);
        rows.push(['SQL병목', sqlBottleneckCount]);

        // ── 영역 2: 인스턴스별 요약 ──
        rows.push([]);
        rows.push(['[ 인스턴스별 요약 ]']);
        rows.push(['인스턴스', '건수', 'TPS', '평균응답(ms)', 'P95(ms)', 'P99(ms)', '최대응답(ms)', '에러수', '에러율(%)', '평균SQL건수', '평균SQL시간(ms)',
            '평균CPU(%)', '최대CPU(%)', '평균Heap(MB)', '최대Heap(MB)', 'GC총횟수', 'GC총시간(ms)']);

        const byInstance = {};
        xlogPoints.forEach(p => {
            const name = p.objName || '(unknown)';
            if (!byInstance[name]) byInstance[name] = [];
            byInstance[name].push(p);
        });

        Object.keys(byInstance).sort().forEach(name => {
            const pts = byInstance[name];
            const elapsed = pts.map(p => p.y).sort((a, b) => a - b);
            const cnt = pts.length;
            const errs = pts.filter(p => p.error || p.color === 'rgba(0,0,0,0.7)').length;
            const avgSqlCount = cnt > 0 ? Number((pts.reduce((s, p) => s + (p.sqlCount || 0), 0) / cnt).toFixed(1)) : 0;
            const avgSqlTime = cnt > 0 ? Math.round(pts.reduce((s, p) => s + (p.sqlTime || 0), 0) / cnt) : 0;
            const cs = getInstanceCounterStats(name);
            rows.push([
                name, cnt,
                Number(calcTPS(cnt, minTime, maxTime).toFixed(1)),
                Math.round(elapsed.reduce((s, v) => s + v, 0) / cnt),
                Math.round(percentile(elapsed, 95)),
                Math.round(percentile(elapsed, 99)),
                elapsed[elapsed.length - 1],
                errs, Number((errs / cnt * 100).toFixed(2)),
                avgSqlCount, avgSqlTime,
                cs.avgCpu, cs.maxCpu, cs.avgHeap, cs.maxHeap, cs.gcTotalCount, cs.gcTotalTime
            ]);
        });

        // ── 영역 3: 서비스별 요약 ──
        rows.push([]);
        rows.push(['[ 서비스별 요약 ]']);
        rows.push(['서비스명', '건수', '평균응답(ms)', 'P95(ms)', 'P99(ms)', '최대응답(ms)', '에러수', '에러율(%)', 'N+1', 'SQL병목']);

        const byService = {};
        xlogPoints.forEach(p => {
            const svc = p.service || '(unknown)';
            if (!byService[svc]) byService[svc] = [];
            byService[svc].push(p);
        });

        Object.entries(byService)
            .sort((a, b) => b[1].length - a[1].length)
            .forEach(([svc, pts]) => {
                const elapsed = pts.map(p => p.y).sort((a, b) => a - b);
                const cnt = pts.length;
                const errs = pts.filter(p => p.error || p.color === 'rgba(0,0,0,0.7)').length;
                const n1 = pts.filter(p => (p.sqlCount || 0) >= n1Threshold).length;
                const sqlBn = pts.filter(p => p.y >= 3000 && (p.sqlTime || 0) > 0 && ((p.sqlTime || 0) / p.y) >= 0.98).length;
                rows.push([
                    svc, cnt,
                    Math.round(elapsed.reduce((s, v) => s + v, 0) / cnt),
                    Math.round(percentile(elapsed, 95)),
                    Math.round(percentile(elapsed, 99)),
                    elapsed[elapsed.length - 1],
                    errs, Number((errs / cnt * 100).toFixed(2)),
                    n1, sqlBn
                ]);
            });

        // ── 영역 4: 응답시간 분포 ──
        rows.push([]);
        rows.push(['[ 응답시간 분포 ]']);
        rows.push(['구간', '건수', '비율(%)']);

        const bands = [
            { label: '~500ms', max: 500 },
            { label: '500ms~1s', max: 1000 },
            { label: '1s~3s', max: 3000 },
            { label: '3s~5s', max: 5000 },
            { label: '5s~', max: Infinity }
        ];
        let prevMax = 0;
        bands.forEach(b => {
            const cnt = xlogPoints.filter(p => p.y > prevMax && (b.max === Infinity ? true : p.y <= b.max)).length;
            rows.push([b.label, cnt, Number((cnt / totalCount * 100).toFixed(2))]);
            prevMax = b.max;
        });

        const ws = XLSX.utils.aoa_to_sheet(rows);
        ws['!cols'] = [
            { wch: 28 }, { wch: 12 }, { wch: 12 }, { wch: 14 }, { wch: 10 },
            { wch: 10 }, { wch: 14 }, { wch: 10 }, { wch: 10 }, { wch: 14 }, { wch: 14 },
            { wch: 12 }, { wch: 12 }, { wch: 14 }, { wch: 14 }, { wch: 10 }, { wch: 14 }
        ];
        XLSX.utils.book_append_sheet(wb, ws, 'Scouter요약');
    }

    function parseTimeToEpoch(timeStr, baseDateMs) {
        // "HH:mm:ss.SSS" → epoch ms
        const parts = timeStr.split(':');
        if (parts.length < 3) return baseDateMs;
        const h = Number(parts[0]) || 0;
        const m = Number(parts[1]) || 0;
        const secParts = parts[2].split('.');
        const s = Number(secParts[0]) || 0;
        const ms = Number(secParts[1]) || 0;
        return baseDateMs + h * 3600000 + m * 60000 + s * 1000 + ms;
    }

    function parseCounterSheet(ws, counters, baseDateMs) {
        const rows = XLSX.utils.sheet_to_json(ws, { header: 1 });
        if (rows.length < 2) return counters.map(() => ({ times: [], values: [] }));

        const header = rows[0];
        // 각 카운터의 컬럼 인덱스 매핑 (label 기준)
        const colMap = {};
        counters.forEach(c => {
            const idx = header.indexOf(c.label);
            if (idx >= 0) colMap[c.key] = idx;
        });

        return counters.map(c => {
            const colIdx = colMap[c.key];
            if (colIdx == null) return { times: [], values: [] };
            const times = [], values = [];
            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                if (!row || !row[0]) continue;
                const t = parseTimeToEpoch(String(row[0]), baseDateMs);
                const v = Number(row[colIdx]);
                if (!isNaN(v)) {
                    times.push(t);
                    values.push(v);
                }
            }
            return { times, values };
        });
    }

    function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    function renderReportFromData(javaCounterResults, javaCounters, javaGroups, hostCounterResults, hostCounters, hostGroups, xlogForChart, allXlogPoints) {
        let html = '';

        // XLog 건수 기반 TPS/ServiceCount 계산 (Excel 모드)
        var xlogTpsInfo = null;
        if (allXlogPoints && allXlogPoints.length > 0) {
            var xMinT = allXlogPoints[0].x, xMaxT = allXlogPoints[0].x;
            for (var xi = 1; xi < allXlogPoints.length; xi++) {
                if (allXlogPoints[xi].x < xMinT) xMinT = allXlogPoints[xi].x;
                if (allXlogPoints[xi].x > xMaxT) xMaxT = allXlogPoints[xi].x;
            }
            var xDurSec = (xMaxT - xMinT) / 1000;
            var xTotalCount = allXlogPoints.length;
            var xByInst = {};
            allXlogPoints.forEach(function(p) {
                var n = (p.objName || '(unknown)').split('/').pop();
                if (!xByInst[n]) xByInst[n] = 0;
                xByInst[n]++;
            });
            var xInstNames = Object.keys(xByInst).sort();
            var xInstDetail = xInstNames.map(function(n) { return n + ' ' + xByInst[n] + '건'; }).join(' + ');
            xlogTpsInfo = { count: xTotalCount, durSec: xDurSec, tps: xDurSec > 0 ? xTotalCount / xDurSec : 0, perMin: xDurSec > 0 ? xTotalCount / (xDurSec / 60) : 0, instDetail: xInstDetail };
        }

        // ── Java 섹션 ──
        if (javaCounterResults.length > 0) {
            // 요약 카드
            html += '<div class="section-title"><span class="section-badge java">JAVA</span>전체 요약</div>';
            html += '<div class="summary-cards">';
            javaCounters.forEach((c, i) => {
                const isXlogBased = (c.key === 'TPS' || c.key === 'ServiceCount') && xlogTpsInfo;
                var displayVal, helpText;
                if (isXlogBased && c.key === 'TPS') {
                    displayVal = xlogTpsInfo.tps.toFixed(1);
                    helpText = c.help + '\n\n산출: 총 ' + xlogTpsInfo.count + '건 ÷ ' + Math.round(xlogTpsInfo.durSec) + '초 = ' + xlogTpsInfo.tps.toFixed(1) + ' TPS (XLog 건수 기반)\n내역: ' + xlogTpsInfo.instDetail;
                } else if (isXlogBased && c.key === 'ServiceCount') {
                    displayVal = xlogTpsInfo.perMin.toFixed(1);
                    helpText = c.help + '\n\n산출: 총 ' + xlogTpsInfo.count + '건 ÷ ' + (xlogTpsInfo.durSec / 60).toFixed(1) + '분 = ' + xlogTpsInfo.perMin.toFixed(1) + ' cnt/min (XLog 건수 기반)\n내역: ' + xlogTpsInfo.instDetail;
                } else {
                    const result = calcSummaryValue(javaCounterResults[i], c.aggregate);
                    displayVal = result.value ? result.value.toFixed(1) : '-';
                    helpText = c.help + (result.detail ? '\n\n산출: ' + result.detail : '');
                }
                html += '<div class="card"><div class="label">' + c.label + ' ' + helpIcon(helpText) + '</div>';
                html += '<div class="value">' + displayVal + '</div>';
                html += '<div class="unit">' + c.unit + '</div></div>';
            });
            html += '</div>';

            // 그룹별 차트
            let idx = 0;
            javaGroups.forEach(group => {
                html += '<div class="section-title"><span class="section-badge java">JAVA</span>' + group.name + '</div>';
                for (let i = 0; i < group.counters.length; i += 2) {
                    html += '<div class="chart-row">';
                    for (let j = i; j < Math.min(i + 2, group.counters.length); j++) {
                        const c = group.counters[j];
                        html += '<div class="chart-box"><h3>' + c.label + '</h3>';
                        html += '<div class="chart-stats" id="stats_' + c.key + '"></div>';
                        html += '<canvas id="chart_' + c.key + '"></canvas></div>';
                    }
                    if (group.counters.length - i === 1) html += '<div class="chart-box" style="visibility:hidden;"></div>';
                    html += '</div>';
                }
                idx += group.counters.length;
            });
        }

        // ── Host 섹션 ──
        if (hostCounterResults.length > 0) {
            html += '<div class="section-title"><span class="section-badge host">HOST</span>전체 요약</div>';
            html += '<div class="summary-cards">';
            hostCounters.forEach((c, i) => {
                const result = calcSummaryValue(hostCounterResults[i], c.aggregate);
                const helpText = c.help + (result.detail ? '\n\n산출: ' + result.detail : '');
                html += '<div class="card"><div class="label">' + c.label + ' ' + helpIcon(helpText) + '</div>';
                html += '<div class="value">' + (result.value ? result.value.toFixed(1) : '-') + '</div>';
                html += '<div class="unit">' + c.unit + '</div></div>';
            });
            html += '</div>';

            let idx = 0;
            hostGroups.forEach(group => {
                html += '<div class="section-title"><span class="section-badge host">HOST</span>' + group.name + '</div>';
                for (let i = 0; i < group.counters.length; i += 2) {
                    html += '<div class="chart-row">';
                    for (let j = i; j < Math.min(i + 2, group.counters.length); j++) {
                        const c = group.counters[j];
                        html += '<div class="chart-box"><h3>' + c.label + '</h3>';
                        html += '<div class="chart-stats" id="stats_' + c.key + '_host"></div>';
                        html += '<canvas id="chart_' + c.key + '_host"></canvas></div>';
                    }
                    if (group.counters.length - i === 1) html += '<div class="chart-box" style="visibility:hidden;"></div>';
                    html += '</div>';
                }
                idx += group.counters.length;
            });
        }

        // ── XLog 섹션 ──
        if (xlogForChart.length > 0) {
            html += '<div class="xlog-section"><div class="chart-row"><div class="chart-box full-width">';
            html += '<h3>XLog (트랜잭션 분포)</h3>';
            html += '<div class="chart-stats" id="statsXlog"></div>';
            html += '<canvas id="chartXlog" height="120"></canvas>';
            html += '<div class="xlog-legend">';
            html += '<div class="xlog-legend-item"><div class="xlog-legend-dot" style="background:rgba(52,152,219,0.7)"></div>빠름 (&lt;1초)</div>';
            html += '<div class="xlog-legend-item"><div class="xlog-legend-dot" style="background:rgba(243,156,18,0.7)"></div>보통 (1~3초)</div>';
            html += '<div class="xlog-legend-item"><div class="xlog-legend-dot" style="background:rgba(231,76,60,0.7)"></div>느림 (&gt;3초)</div>';
            html += '<div class="xlog-legend-item"><div class="xlog-legend-dot" style="background:rgba(0,0,0,0.7)"></div>에러</div>';
            html += '</div></div></div></div>';

            // TXID 조회
            html += '<div class="chart-row"><div class="chart-box full-width">';
            html += '<h3>TXID 조회</h3>';
            html += '<div style="display:flex;gap:8px;align-items:center;">';
            html += '<input type="text" id="txidSearchInput" placeholder="TXID 입력" onkeydown="if(event.key===\'Enter\')searchByTxid()" style="flex:1;padding:6px 10px;border:1px solid #ddd;border-radius:4px;font-size:13px;">';
            html += '<button onclick="searchByTxid()" style="padding:6px 16px;background:#4a90d9;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:13px;">조회</button>';
            html += '</div><div id="txidSearchResult" style="margin-top:8px;font-size:13px;color:#888;"></div>';
            html += '</div></div>';

            html += '<div class="chart-row"><div class="chart-box full-width">';
            html += '<h3>느린 API Top 5</h3>';
            html += '<table class="slow-api-table"><thead><tr><th>#</th><th>서비스명</th><th>TXID</th><th>응답시간 (ms)</th><th>시작 시간</th><th>종료 시간</th></tr></thead>';
            html += '<tbody id="slowApiBody"></tbody></table>';
            html += '</div></div>';

            // Object별 통계 요약
            html += '<div class="chart-row"><div class="chart-box full-width">';
            html += '<h3>Object별 통계 요약</h3>';
            html += '<table class="slow-api-table"><thead><tr><th>Object</th><th>호출수</th><th>평균(ms)</th><th>최대(ms)</th><th>평균SQL건수</th><th>평균SQL시간(ms)</th><th>에러수</th><th>에러율(%)</th></tr></thead>';
            html += '<tbody id="objectSummaryBody"></tbody></table>';
            html += '</div></div>';

            // 서비스별 통계 요약
            html += '<div class="chart-row"><div class="chart-box full-width">';
            html += '<h3>서비스별 통계 요약</h3>';
            html += '<table class="slow-api-table"><thead><tr><th>서비스명</th><th>호출수</th><th>평균(ms)</th><th>최대(ms)</th><th>평균SQL건수</th><th>평균SQL시간(ms)</th><th>에러수</th><th>에러율(%)</th></tr></thead>';
            html += '<tbody id="serviceSummaryBody"></tbody></table>';
            html += '</div></div>';

            // 에러 분석
            html += '<div class="chart-row"><div class="chart-box full-width">';
            html += '<h3>에러 분석</h3>';
            html += '<table class="slow-api-table"><thead><tr><th>시간</th><th>인스턴스</th><th>서비스명</th><th>TXID</th><th>응답시간(ms)</th><th>에러 메시지</th><th>태그</th></tr></thead>';
            html += '<tbody id="errorAnalysisBody"></tbody></table>';
            html += '</div></div>';
        }

        // DOM 삽입
        document.getElementById('reportContent').innerHTML = html;

        // 차트 파괴 후 재생성
        Object.keys(charts).forEach(k => { if (charts[k]) charts[k].destroy(); });
        charts = {};

        // Java 카운터 차트
        if (javaCounterResults.length > 0) {
            let drawIdx = 0;
            javaGroups.forEach(group => {
                group.counters.forEach(c => {
                    const vals = c.transform ? javaCounterResults[drawIdx].values.map(c.transform) : javaCounterResults[drawIdx].values;
                    showStats('stats_' + c.key, vals, 1, c.unit);
                    drawChart('chart_' + c.key, c.label + ' (' + c.unit + ')', javaCounterResults[drawIdx], c.color, c.threshold || null, c.transform || null, c.aggregate);
                    drawIdx++;
                });
            });
        }

        // Host 카운터 차트
        if (hostCounterResults.length > 0) {
            let drawIdx = 0;
            hostGroups.forEach(group => {
                group.counters.forEach(c => {
                    const vals = c.transform ? hostCounterResults[drawIdx].values.map(c.transform) : hostCounterResults[drawIdx].values;
                    showStats('stats_' + c.key + '_host', vals, 1, c.unit);
                    drawChart('chart_' + c.key + '_host', c.label + ' (' + c.unit + ')', hostCounterResults[drawIdx], c.color, c.threshold || null, c.transform || null, c.aggregate);
                    drawIdx++;
                });
            });
        }

        // XLog scatter 차트
        if (xlogForChart.length > 0) {
            drawXLogChartFromPoints(xlogForChart);

            // 느린 API Top 5 (전체 데이터 기준)
            const useForSlowApi = allXlogPoints || xlogForChart;
            updateSlowApiTableFromPoints(useForSlowApi);
            updateObjectSummaryFromPoints(useForSlowApi);
            updateServiceSummaryFromPoints(useForSlowApi);
            updateErrorAnalysisFromPoints(useForSlowApi);

            const statsEl = document.getElementById('statsXlog');
            if (statsEl) statsEl.textContent = '총 ' + xlogForChart.length + '건';
        }

        // document.getElementById('btnExcel').disabled = true; // 엑셀 내보내기 버튼 비활성화
    }

    function drawXLogChartFromPoints(points) {
        if (charts['chartXlog']) charts['chartXlog'].destroy();
        const canvas = document.getElementById('chartXlog');
        if (!canvas) return;

        xlogDataPoints = points;

        charts['chartXlog'] = new Chart(canvas, {
            type: 'scatter',
            data: {
                datasets: [{
                    data: points,
                    pointBackgroundColor: points.map(p => p.color),
                    pointBorderColor: points.map(p => p.color),
                    pointRadius: 3, pointHoverRadius: 6
                }]
            },
            options: {
                responsive: true,
                animation: false,
                onClick: function(evt, elements) {
                    if (elements.length > 0) {
                        openProfileModal([points[elements[0].index]]);
                    }
                },
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        callbacks: {
                            label: function(ctx) {
                                const p = points[ctx.dataIndex];
                                const t = new Date(p.x);
                                const prefix = p.objName ? '[' + p.objName + '] ' : '';
                                return prefix + p.service + ' | ' + p.y + 'ms | ' + pad(t.getHours()) + ':' + pad(t.getMinutes()) + ':' + pad(t.getSeconds());
                            }
                        }
                    },
                    annotation: {
                        annotations: {
                            thresholdLine: {
                                type: 'line', yMin: 3000, yMax: 3000,
                                borderColor: 'rgba(231,76,60,0.5)', borderWidth: 2, borderDash: [6, 4],
                                label: { display: true, content: '3초', position: 'end', backgroundColor: 'rgba(231,76,60,0.7)', font: { size: 10 } }
                            }
                        }
                    }
                },
                scales: {
                    x: { ticks: { callback: v => { const d = new Date(v); return pad(d.getHours()) + ':' + pad(d.getMinutes()); }, maxTicksLimit: 12, font: { size: 11 } } },
                    y: { beginAtZero: true, title: { display: true, text: 'Elapsed (ms)', font: { size: 11 } } }
                }
            }
        });

        setupXLogDrag(canvas);
    }

    function updateSlowApiTableFromPoints(points) {
        const tbody = document.getElementById('slowApiBody');
        if (!tbody) return;
        if (!points || points.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#999;">데이터 없음</td></tr>';
            return;
        }
        const sorted = [...points].sort((a, b) => b.y - a.y).slice(0, 5);
        slowApiXlogs = sorted.map(p => ({
            endTime: p.x, elapsed: p.y, serviceName: p.service,
            txid: p.txid, sqlCount: p.sqlCount, sqlTime: p.sqlTime || 0,
            apicallCount: p.apicallCount, apicallTime: p.apicallTime || 0, objName: p.objName
        }));
        tbody.innerHTML = sorted.map((p, i) => {
            const endMs = p.x;
            const elapsed = p.y;
            const startMs = endMs - elapsed;
            const color = elapsed > 3000 ? '#e74c3c' : elapsed > 1000 ? '#f39c12' : '#333';
            return '<tr><td>' + (i+1) + '</td><td>' + escHtml(p.service || '-')
                + '</td><td style="font-size:11px;">' + (p.txid || '-')
                + '</td><td style="color:' + color + ';font-weight:bold;">' + elapsed.toLocaleString()
                + '</td><td>' + formatTimeMs(startMs)
                + '</td><td>' + formatTimeMs(endMs) + '</td></tr>';
        }).join('');
    }
</script>
</body>
</html>
